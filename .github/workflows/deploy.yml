name: Deploy to Vercel

# Production deploys run when changes land on main. A manual trigger is also
# provided. The job is guarded so it skips cleanly (no red X) until the three
# Vercel secrets are added to the repository:
#   Settings → Secrets and variables → Actions
#     VERCEL_TOKEN       (Vercel → Account Settings → Tokens)
#     VERCEL_ORG_ID      (from `vercel link`, in .vercel/project.json)
#     VERCEL_PROJECT_ID  (from `vercel link`, in .vercel/project.json)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    # Skip entirely until you opt in: add a repository *variable*
    # ENABLE_VERCEL_DEPLOY = true (Settings → Secrets and variables →
    # Actions → Variables). The `secrets` context is not allowed in `if:`,
    # so we gate on a variable instead.
    if: ${{ vars.ENABLE_VERCEL_DEPLOY == 'true' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
